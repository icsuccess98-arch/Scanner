<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Setups - The Strat</title>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
            color: #fff;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 100%);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #FFD700;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header h1 {
            color: #FFD700;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .header p {
            color: #888;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        
        .timeframe-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background: rgba(26, 26, 46, 0.8);
        }
        
        .timeframe-tab {
            padding: 10px 24px;
            border: none;
            border-radius: 25px;
            background: #2d2d44;
            color: #888;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .timeframe-tab.active {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #000;
        }
        
        .category-tabs {
            display: flex;
            gap: 8px;
            padding: 10px 15px;
            overflow-x: auto;
            background: rgba(15, 15, 26, 0.9);
            border-bottom: 1px solid #333;
            scrollbar-width: none;
        }
        
        .category-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .category-tab {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: transparent;
            color: #888;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }
        
        .category-tab.active {
            color: #FFD700;
            border-bottom: 2px solid #FFD700;
        }
        
        .content-area {
            padding: 15px;
        }
        
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top-color: #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 15px;
            color: #888;
        }
        
        .summary-card {
            background: linear-gradient(135deg, #1a1a2e, #2d2d44);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #FFD700;
        }
        
        .summary-stats {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .stat-item {
            text-align: center;
            min-width: 60px;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #FFD700;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: #888;
            margin-top: 3px;
        }
        
        .setup-section {
            margin-bottom: 25px;
        }
        
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }
        
        .section-header i {
            color: #FFD700;
            font-size: 1.2rem;
        }
        
        .section-header h3 {
            font-size: 1rem;
            color: #fff;
        }
        
        .section-header .count {
            background: #FFD700;
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .setup-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        
        .setup-card {
            background: linear-gradient(135deg, #1a1a2e, #252540);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #333;
            transition: all 0.3s ease;
        }
        
        .setup-card:hover {
            border-color: #FFD700;
            transform: translateY(-2px);
        }
        
        .setup-card.aplus {
            border: 2px solid #FFD700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }
        
        .card-symbol {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .symbol-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }
        
        .strat-badge {
            background: #333;
            color: #FFD700;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .card-price {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
        }
        
        .price-value {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }
        
        .price-arrow {
            font-size: 1.2rem;
        }
        
        .price-arrow.up {
            color: #00C853;
        }
        
        .price-arrow.down {
            color: #FF5252;
        }
        
        .price-change {
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .price-change.positive {
            color: #00C853;
        }
        
        .price-change.negative {
            color: #FF5252;
        }
        
        .ftfc-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 5px;
        }
        
        .ftfc-badge.bullish {
            background: rgba(0, 200, 83, 0.2);
            color: #00C853;
        }
        
        .ftfc-badge.bearish {
            background: rgba(255, 82, 82, 0.2);
            color: #FF5252;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            color: #444;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #1a1a2e, #2d2d44);
            border-top: 1px solid #333;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #666;
            font-size: 0.7rem;
            padding: 5px 15px;
            transition: color 0.3s ease;
        }
        
        .nav-item i {
            font-size: 1.3rem;
            margin-bottom: 3px;
        }
        
        .nav-item.active {
            color: #FFD700;
        }
        
        @media (max-width: 480px) {
            .setup-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="bi bi-graph-up-arrow"></i> Stock Setups</h1>
        <p>The Strat Methodology</p>
    </div>
    
    <div class="timeframe-tabs">
        <button class="timeframe-tab active" data-timeframe="daily">Daily</button>
        <button class="timeframe-tab" data-timeframe="weekly">Weekly</button>
        <button class="timeframe-tab" data-timeframe="monthly">Monthly</button>
    </div>
    
    <div class="category-tabs" id="categoryTabs">
        <button class="category-tab active" data-category="all">All</button>
        <button class="category-tab" data-category="aplus" id="aplusTab">A++</button>
        <button class="category-tab" data-category="inside">Inside (1)</button>
        <button class="category-tab" data-category="outside">Outside (3)</button>
        <button class="category-tab" data-category="continuation">2U/2D</button>
        <button class="category-tab" data-category="failed2">Failed 2</button>
        <button class="category-tab" data-category="ftfc" id="ftfcTab">FTFC</button>
    </div>
    
    <div class="content-area" id="contentArea">
        <div class="loading-container" id="loadingState">
            <div class="loading-spinner"></div>
            <p class="loading-text">Scanning stocks...</p>
        </div>
        <div id="resultsContainer" style="display: none;"></div>
    </div>
    
    <nav class="bottom-nav">
        <a href="/" class="nav-item active">
            <i class="bi bi-graph-up-arrow"></i>
            <span>Stocks</span>
        </a>
    </nav>

    <script>
        let currentTimeframe = 'daily';
        let currentCategory = 'all';
        let currentData = null;
        
        document.querySelectorAll('.timeframe-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.timeframe-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTimeframe = tab.dataset.timeframe;
                fetchStockSetups();
            });
        });
        
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentCategory = tab.dataset.category;
                if (currentData) renderResults();
            });
        });
        
        async function fetchStockSetups() {
            const loading = document.getElementById('loadingState');
            const container = document.getElementById('resultsContainer');
            
            loading.style.display = 'flex';
            container.style.display = 'none';
            
            try {
                const response = await fetch(`/api/stock_setups?timeframe=${currentTimeframe}`);
                currentData = await response.json();
                renderResults();
            } catch (error) {
                console.error('Error fetching stock setups:', error);
                container.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-circle"></i><p>Error loading stock data</p></div>';
                container.style.display = 'block';
            }
            
            loading.style.display = 'none';
        }
        
        function renderSection(title, icon, setups, isAplus = false) {
            if (!setups || setups.length === 0) return '';
            
            let cardsHtml = setups.map(s => `
                <div class="setup-card ${isAplus ? 'aplus' : ''}">
                    <div class="card-symbol">
                        <span class="symbol-name">${s.symbol}</span>
                        <span class="strat-badge">${s.strat}</span>
                    </div>
                    <div class="card-price">
                        <span class="price-value">$${s.close}</span>
                        <span class="price-arrow ${s.direction === 'UP' ? 'up' : 'down'}">${s.arrow}</span>
                        <span class="price-change ${s.change_pct >= 0 ? 'positive' : 'negative'}">${s.change_pct >= 0 ? '+' : ''}${s.change_pct}%</span>
                    </div>
                    ${s.ftfc ? `<span class="ftfc-badge ${s.ftfc.direction.toLowerCase()}">${s.ftfc.direction} FTFC</span>` : ''}
                </div>
            `).join('');
            
            return `
                <div class="setup-section">
                    <div class="section-header">
                        <i class="bi bi-${icon}"></i>
                        <h3>${title}</h3>
                        <span class="count">${setups.length}</span>
                    </div>
                    <div class="setup-grid">
                        ${cardsHtml}
                    </div>
                </div>
            `;
        }
        
        function renderResults() {
            const container = document.getElementById('resultsContainer');
            const loading = document.getElementById('loadingState');
            
            loading.style.display = 'none';
            container.style.display = 'block';
            
            let html = '';
            
            const isDaily = currentTimeframe === 'daily';
            
            html += `
                <div class="summary-card">
                    <div class="summary-stats">
                        ${isDaily ? `
                        <div class="stat-item">
                            <div class="stat-value">${currentData.aplus_setups?.length || 0}</div>
                            <div class="stat-label">A++</div>
                        </div>
                        ` : ''}
                        <div class="stat-item">
                            <div class="stat-value">${currentData.inside_bars?.length || 0}</div>
                            <div class="stat-label">Inside</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${currentData.outside_bars?.length || 0}</div>
                            <div class="stat-label">Outside</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${(currentData.two_up?.length || 0) + (currentData.two_down?.length || 0)}</div>
                            <div class="stat-label">2U/2D</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value">${(currentData.failed_2u?.length || 0) + (currentData.failed_2d?.length || 0)}</div>
                            <div class="stat-label">Failed</div>
                        </div>
                        ${isDaily ? `
                        <div class="stat-item">
                            <div class="stat-value">${(currentData.ftfc_bullish?.length || 0) + (currentData.ftfc_bearish?.length || 0)}</div>
                            <div class="stat-label">FTFC</div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;
            
            const aplusTab = document.getElementById('aplusTab');
            const ftfcTab = document.getElementById('ftfcTab');
            if (currentTimeframe !== 'daily') {
                aplusTab.style.display = 'none';
                ftfcTab.style.display = 'none';
            } else {
                aplusTab.style.display = '';
                ftfcTab.style.display = '';
            }
            
            if (currentCategory === 'all' || currentCategory === 'aplus') {
                if (currentData.aplus_setups?.length > 0) {
                    html += renderSection('A++ Setups', 'star-fill', currentData.aplus_setups, true);
                }
            }
            
            if (currentCategory === 'all' || currentCategory === 'inside') {
                if (currentData.inside_bars?.length > 0) {
                    html += renderSection('Inside Bars (1)', 'circle', currentData.inside_bars);
                }
                if (currentData.double_inside?.length > 0) {
                    html += renderSection('Double Inside', 'bullseye', currentData.double_inside);
                }
            }
            
            if (currentCategory === 'all' || currentCategory === 'outside') {
                if (currentData.outside_bars?.length > 0) {
                    html += renderSection('Outside Bars (3)', 'arrows-angle-expand', currentData.outside_bars);
                }
            }
            
            if (currentCategory === 'all' || currentCategory === 'continuation') {
                if (currentData.two_up?.length > 0) {
                    html += renderSection('2U (Up Continuation)', 'arrow-up-right', currentData.two_up);
                }
                if (currentData.two_down?.length > 0) {
                    html += renderSection('2D (Down Continuation)', 'arrow-down-right', currentData.two_down);
                }
            }
            
            if (currentCategory === 'all' || currentCategory === 'failed2') {
                if (currentData.failed_2u?.length > 0) {
                    html += renderSection('Failed 2U (Bearish)', 'arrow-down-circle', currentData.failed_2u);
                }
                if (currentData.failed_2d?.length > 0) {
                    html += renderSection('Failed 2D (Bullish)', 'arrow-up-circle', currentData.failed_2d);
                }
            }
            
            if (currentCategory === 'all' || currentCategory === 'ftfc') {
                if (currentData.ftfc_bullish?.length > 0) {
                    html += renderSection('FTFC Bullish', 'graph-up-arrow', currentData.ftfc_bullish);
                }
                if (currentData.ftfc_bearish?.length > 0) {
                    html += renderSection('FTFC Bearish', 'graph-down-arrow', currentData.ftfc_bearish);
                }
            }
            
            if (!html.includes('setup-section')) {
                html += `
                    <div class="empty-state">
                        <i class="bi bi-search"></i>
                        <p>No setups found for this category</p>
                    </div>
                `;
            }
            
            container.innerHTML = html;
        }
        
        fetchStockSetups();
    </script>
</body>
</html>
